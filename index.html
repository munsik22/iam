<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소개 | 개발자 박준식</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            50: '#F1F5F9',
                            100: '#E2E8F0',
                            800: '#1E293B',
                            900: '#0F172A',
                        },
                        butter: {
                            100: '#FEF3C7',
                            400: '#FBBF24',
                            500: '#F59E0B',
                            600: '#D97706',
                        },
                        offwhite: '#F8FAFC'
                    },
                    fontFamily: {
                        sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="text-navy-800 antialiased selection:bg-butter-100 selection:text-butter-600 flex flex-col min-h-screen">

    <div id="header-placeholder" class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100"></div>

    <main class="flex-grow">
        <section class="relative overflow-hidden py-20 lg:py-32 bg-gradient-to-b from-navy-50 to-offwhite border-b border-slate-100">
            <div class="absolute top-10 left-10 w-72 h-72 bg-butter-100/30 rounded-full blur-3xl -z-10"></div>
            <div class="absolute bottom-10 right-10 w-96 h-96 bg-navy-100/40 rounded-full blur-3xl -z-10"></div>

            <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
                    
                    <div class="lg:col-span-7 text-center lg:text-left">
                        <div class="inline-flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border border-navy-100 text-xs font-semibold text-navy-800 shadow-sm mb-6">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                            SSAFY 예비 핵심 팀원 대기 중 🚀
                        </div>
                        <h1 class="text-3xl sm:text-4xl lg:text-5xl font-extrabold text-navy-900 tracking-tight leading-tight mb-6">
                            보이지 않는 곳을<br>
                            <span class="text-transparent bg-clip-text bg-gradient-to-r from-navy-800 to-navy-900 border-b-4 border-butter-400 pb-1">단단하게 지탱하는</span> 인프라처럼,
                        </h1>
                        <p class="text-lg text-slate-600 leading-relaxed max-w-xl mx-auto lg:mx-0 mb-8 font-medium">
                            든든하고 섬세한 개발자 박준식입니다.
                        </p>

                        <div class="flex flex-wrap justify-center lg:justify-start gap-2 mb-10">
                            <span class="bg-white border border-navy-100 px-3 py-1.5 rounded-full text-xs font-semibold shadow-sm">#안정적인_인프라구축</span>
                            <span class="bg-white border border-navy-100 px-3 py-1.5 rounded-full text-xs font-semibold shadow-sm">#섬세한_비즈니스로직</span>
                            <span class="bg-white border border-navy-100 px-3 py-1.5 rounded-full text-xs font-semibold shadow-sm">#전자공학_구조적사고</span>
                            <span class="bg-white border border-navy-100 px-3 py-1.5 rounded-full text-xs font-semibold shadow-sm">#다정한_동료_ISFJ</span>
                        </div>

                        <div class="flex flex-col sm:flex-row justify-center lg:justify-start gap-4">
                            <a href="skills.html" class="bg-navy-800 hover:bg-navy-900 text-white font-semibold px-6 py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-navy-900/10 hover:shadow-xl">
                                검증된 실력 확인하기
                                <i class="fa-solid fa-arrow-right"></i>
                            </a>
                            <a href="life.html" class="bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 font-semibold px-6 py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 shadow-sm">
                                🐶 문식이와 일상 구경하기
                            </a>
                        </div>
                    </div>

                    <div class="lg:col-span-5 flex flex-col items-center justify-center">
                        <div class="relative bg-white p-6 rounded-3xl border border-navy-100 shadow-xl max-w-sm w-full transition-transform duration-300 hover:scale-[1.02]">

                            <div class="bg-gradient-to-tr from-navy-800 to-slate-700 rounded-2xl p-6 text-white flex flex-col items-center relative overflow-hidden">
                                <div class="absolute right-[-20px] top-[-20px] w-40 h-40 bg-butter-500/10 rounded-full blur-xl"></div>
                                
                                <div class="w-32 h-32 mb-4 rounded-full overflow-hidden border-4 border-white/20 shadow-inner">
                                    <img src="images/profile.jpg" 
                                         alt="박준식 프로필 사진" 
                                         onerror="this.onerror=null; this.src='https://placehold.co/150x150/1E293B/FEF3C7?text=JunSik'"
                                         class="w-full h-full object-cover">
                                </div>
                                
                                <h3 class="text-xl font-bold text-butter-400">박준식</h3>
                                <p class="text-xs text-slate-300 mt-1">든든하고 섬세한 백엔드 개발자</p>
                            </div>

                            <div class="mt-6 space-y-3">
                                <div class="flex items-center justify-between text-sm border-b border-dashed border-slate-100 pb-2">
                                    <span class="text-slate-500 font-medium"><i class="fa-solid fa-graduation-cap text-navy-800 mr-2"></i> 전공</span>
                                    <span class="font-bold text-navy-900">전자공학부 학사</span>
                                </div>
                                <div class="flex items-center justify-between text-sm border-b border-dashed border-slate-100 pb-2">
                                    <span class="text-slate-500 font-medium"><i class="fa-solid fa-id-card text-navy-800 mr-2"></i> MBTI</span>
                                    <span class="font-bold text-navy-900">ISFJ (차분하고 성실한 조력자)</span>
                                </div>
                                <div class="flex items-center justify-between text-sm border-b border-dashed border-slate-100 pb-2">
                                    <span class="text-slate-500 font-medium"><i class="fa-solid fa-server text-navy-800 mr-2"></i> 입증된 강점 영역</span>
                                    <span class="bg-navy-800 text-butter-400 text-xs px-2.5 py-0.5 rounded-full font-bold">인프라 배포 & 주문 로직</span>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <footer id="footer-placeholder" class="bg-navy-900 text-slate-400 border-t border-slate-800 py-12 mt-auto"></footer>

    <script src="js/main.js" defer></script>
</body>
</html>
