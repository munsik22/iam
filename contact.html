<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연락하기 | 개발자 박준식</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="text-slate-800 antialiased selection:bg-butter-100 selection:text-butter-600 flex flex-col min-h-screen">

    <div id="header-placeholder" class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100"></div>

    <main class="flex-grow flex items-center justify-center bg-slate-800 text-white relative overflow-hidden py-24">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-butter-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10 w-full">
            <span class="text-xs font-bold uppercase tracking-wider text-butter-400 bg-butter-500/10 px-3 py-1 rounded-full">Contact</span>
            <h2 class="text-3xl sm:text-4xl font-extrabold mt-4 mb-6">우리, 함께 멋진 프로젝트 만들어봐요!</h2>
            <p class="text-slate-300 text-lg leading-relaxed max-w-2xl mx-auto mb-12">
                SSAFY 프로젝트를 든든하고 안정감 있게 뒷받침해줄 완벽한 인프라 & 백엔드 개발자를 찾으신다면 망설임 없이 손을 내밀어 주세요.
            </p>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-lg mx-auto mb-16 text-left">
                <div class="bg-slate-900 border border-slate-700/60 p-5 rounded-2xl flex flex-col justify-between shadow-lg">
                    <div>
                        <div class="text-butter-400 text-lg mb-2"><i class="fa-solid fa-envelope"></i></div>
                        <div class="text-xs text-slate-400">이메일 연락망</div>
                        <div class="text-sm font-bold mt-1 text-white select-all">qkrwns1478@naver.com</div>
                    </div>
                    <button onclick="copyToClipboard('qkrwns1478@naver.com')" class="mt-4 w-full bg-slate-800 hover:bg-slate-700 text-butter-400 hover:text-butter-300 border border-slate-700/80 transition-all py-2.5 px-4 rounded-xl text-xs font-semibold flex items-center justify-center gap-2 shadow-sm">
                        <i class="fa-regular fa-copy"></i>
                        <span>이메일 주소 복사하기</span>
                    </button>
                </div>
                <div class="bg-slate-900 border border-slate-700/60 p-5 rounded-2xl flex flex-col justify-between shadow-lg">
                    <div>
                        <div class="text-butter-400 text-lg mb-2"><i class="fa-solid fa-comment-dots"></i></div>
                        <div class="text-xs text-slate-400">카카오톡 ID / 메신저</div>
                        <div class="text-sm font-bold mt-1 text-white select-all">@qkrwns1478</div>
                    </div>
                    <button onclick="copyToClipboard('@qkrwns1478')" class="mt-4 w-full bg-slate-800 hover:bg-slate-700 text-butter-400 hover:text-butter-300 border border-slate-700/80 transition-all py-2.5 px-4 rounded-xl text-xs font-semibold flex items-center justify-center gap-2 shadow-sm">
                        <i class="fa-regular fa-copy"></i>
                        <span>카카오톡 ID 복사하기</span>
                    </button>
                </div>
            </div>

            <div id="toast-message" class="hidden fixed bottom-6 right-6 z-50 bg-slate-900 border border-butter-400 text-white py-3 px-5 rounded-xl shadow-2xl items-center gap-3">
                <span class="text-butter-400">📋</span>
                <span id="toast-text" class="text-xs font-semibold">복사되었습니다!</span>
            </div>

        </div>
    </main>

    <footer id="footer-placeholder" class="bg-slate-900 text-slate-400 border-t border-slate-800 py-12 mt-auto"></footer>

    <script src="js/main.js" defer></script>
</body>
</html>
